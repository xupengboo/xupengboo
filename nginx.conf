
user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    # tcp_nopush     on;

    keepalive_timeout  65;

    client_max_body_size 8M; # 根据实际情况设置更大的值
    large_client_header_buffers 4 32k; # 根据实际情况设置更大的值

    # gzip  on;

    server {
        listen       443 ssl;
        server_name  www.xupengboo.top;

        # 证书路径（Let's Encrypt 免费证书或商业证书）
        ssl_certificate     /etc/letsencrypt/live/www.xupengboo.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.xupengboo.top/privkey.pem;

        # 推荐的安全配置
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        index  index.html index.htm;
        error_page  404              /404.html;
        error_page  500 502 503 504  /50x.html;

        location / {
          root /usr/share/nginx/html;
          try_files $uri $uri/ /index.html;
          index  index.html index.htm;
        }

        location = /50x.html {
            root   /usr/share/nginx/html;
        }

    }

    # HTTP 强制跳转 HTTPS
    server {
        listen 80;
        server_name www.xupengboo.top;
        return 301 https://$host$request_uri;
    }

    include /etc/nginx/conf.d/*.conf;

}
