name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd ~/xupengboo/
            git pull origin main

            VERSION=1.1.${{ github.run_number }}
            docker rm -f xupengboo
            docker images --quiet xupengboo:1.1.* | xargs docker rmi
            docker build -t xupengboo:$VERSION .
            docker run -d -p 80:80 -p 443:443 -v /etc/letsencrypt/archive/www.xupengboo.top:/etc/letsencrypt/archive/www.xupengboo.top --restart=always --name xupengboo xupengboo:$VERSION
