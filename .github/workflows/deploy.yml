name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd ~/xupengboo/
            git pull origin main

            VERSION=1.1.${{ github.run_number }}

            docker build -t xupengboo:$VERSION .
            docker rm -f xupengboo
            docker run -d -p 80:80 --name xupengboo xupengboo:$VERSION

  sync-gitee:
    runs-on: ubuntu-latest
    needs: deploy  # ← 关键：等 deploy job 成功后才执行

    steps:
      - name: Sync to Gitee
        run: |
          curl -X PUT \
            "https://gitee.com/api/v5/repos/xupengboo/xupengboo/mirror" \
            -H "Content-Type: application/json" \
            -d '{"access_token": "${{ secrets.GITEE_TOKEN }}"}'
